name: Daily News Enrichment

on:
  schedule:
    # Runs every day at 09:00 UTC
    - cron: "0 9 * * *"
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  enrich:
    name: Fetch RSS & Enrich Articles
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run enrichment pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/rss_enrichment.py

      - name: Upload enrichment log on success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: enrichment-log-${{ github.run_id }}
          path: enrichment.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.issues.create({
              owner,
              repo,
              title: `❌ Daily Enrichment Failed — ${new Date().toISOString().slice(0,10)}`,
              body: `The daily enrichment pipeline failed.\n\n**Run:** [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\nPlease check the logs above.`,
              labels: ["bug", "pipeline"]
            });
